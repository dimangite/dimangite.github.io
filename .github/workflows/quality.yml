name: Static Quality Checks

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Basic HTML sanity checks
        run: |
          set -euo pipefail
          for file in index.html privacy.html; do
            grep -qi '<!doctype html>' "$file"
            grep -qi '<html' "$file"
            grep -qi '<meta charset=' "$file"
            grep -qi '<meta name="viewport"' "$file"
            grep -qi '<title>' "$file"
          done

      - name: Offline link checks (docs and local references)
        # Keep checks lightweight and low-noise for a static portfolio repo.
        # --offline avoids flaky external-network failures while still validating local links.
        # Shell strict mode propagates lychee non-zero exit codes and fails the job.
        run: |
          set -euo pipefail
          docker run --rm \
            --volume "$PWD:/repo" \
            --workdir /repo \
            lycheeverse/lychee@sha256:8bafa87dc394ebc0370694063466c70eb9f129910429af7533e9cf79c139279d \
            --offline \
            --no-progress \
            --base /repo \
            README.md ARCHITECTURE.md CHANGELOG.md index.html privacy.html
