name: Static Quality Checks

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Basic HTML sanity checks
        run: |
          set -euo pipefail
          for file in index.html privacy.html; do
            grep -qi '<!doctype html>' "$file"
            grep -qi '<html' "$file"
            grep -qi '<meta charset=' "$file"
            grep -qi '<meta name="viewport"' "$file"
            grep -qi '<title>' "$file"
          done

      - name: Offline link checks (docs and local references)
        # Keep checks lightweight and low-noise for a static portfolio repo.
        # Validate only repository-local links to avoid flaky external-network failures.
        run: |
          set -euo pipefail
          python - <<'PY'
          import re
          import sys
          from pathlib import Path
          from urllib.parse import urlparse

          repo_root = Path(".").resolve()
          targets = [
              repo_root / "README.md",
              repo_root / "ARCHITECTURE.md",
              repo_root / "CHANGELOG.md",
              repo_root / "index.html",
              repo_root / "privacy.html",
          ]

          target_text = {target: target.read_text(encoding="utf-8") for target in targets}
          markdown_link_pattern = re.compile(r"\[[^\]]*\]\(([^)]+)\)")
          html_link_pattern = re.compile(
              r"""(?:href|src)=(?:["']([^"']+)["']|([^\s>]+))""",
              re.IGNORECASE,
          )
          ignored_prefixes = ("mailto:", "tel:", "javascript:", "data:")
          errors = []

          def markdown_slug(heading: str) -> str:
              slug = heading.strip().lower()
              slug = re.sub(r"[^a-z0-9\s-]", "", slug)
              slug = re.sub(r"\s+", "-", slug)
              slug = re.sub(r"-{2,}", "-", slug)
              return slug.strip("-")

          def has_fragment_target(target: Path, fragment: str) -> bool:
              text = target_text.get(target)
              if text is None:
                  if not target.exists():
                      return False
                  text = target.read_text(encoding="utf-8")
                  target_text[target] = text

              escaped_fragment = re.escape(fragment)
              if re.search(
                  rf"""(?:id|name)=["']{escaped_fragment}["']""",
                  text,
                  re.IGNORECASE,
              ):
                  return True

              if target.suffix.lower() in {".md", ".markdown"}:
                  heading_pattern = re.compile(
                      r"^\s{0,3}#{1,6}\s+(.+?)\s*#*\s*$",
                      re.MULTILINE,
                  )
                  slugs = {markdown_slug(h.rstrip()) for h in heading_pattern.findall(text)}
                  return fragment in slugs

              return False

          def check_link(raw_link: str, source_file: Path) -> None:
              link = raw_link.strip()
              if not link or link.startswith(ignored_prefixes):
                  return
              parsed = urlparse(link)
              if parsed.scheme in ("http", "https"):
                  return

              path_part = parsed.path
              if not path_part:
                  candidate = source_file
              elif path_part.startswith("/"):
                  candidate = repo_root / path_part.lstrip("/")
              else:
                  candidate = (source_file.parent / path_part).resolve()

              try:
                  candidate.relative_to(repo_root)
              except ValueError:
                  errors.append(f"{source_file}: {link} resolves outside repository")
                  return

              if not candidate.exists():
                  errors.append(f"{source_file}: missing target for {link}")
                  return

              if parsed.fragment and not has_fragment_target(candidate, parsed.fragment):
                  errors.append(f"{source_file}: missing fragment target for {link}")

          for target in targets:
              text = target_text[target]
              for match in markdown_link_pattern.findall(text):
                  check_link(match, target)
              for quoted, unquoted in html_link_pattern.findall(text):
                  check_link(quoted or unquoted, target)

          if errors:
              print("Local link check failures:")
              for error in errors:
                  print(f"- {error}")
              sys.exit(1)

          print("Local link checks passed.")
          PY
